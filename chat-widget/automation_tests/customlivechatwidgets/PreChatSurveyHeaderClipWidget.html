<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Pre-Chat Survey Header Clip Widget (Bug 6525143)</title>
</head>

<body style="margin: 0">
  <script>
    // Repro fixture for Bug 6525143: header clipped on the pre-chat surface.
    // The #oc-lcw container is a fixed 560px, centered (justify-content: center)
    // flex column. The pre-chat survey below is deliberately TALLER than 560px so
    // its content overflows the container. Before the fix, the centered overflow
    // clipped the top of the header; after the fix the pane scrolls internally and
    // the header stays fully visible.
    function buildTallPreChatSurvey() {
      var body = [
        { type: "TextBlock", text: "Please tell us about yourself", weight: "Bolder", size: "Medium" }
      ];
      // 12 text inputs guarantee the survey height exceeds the 560px container.
      for (var i = 1; i <= 12; i++) {
        body.push({ type: "TextBlock", text: "Question " + i });
        body.push({ type: "Input.Text", id: "q" + i, label: "Question " + i, placeholder: "Answer " + i });
      }
      return JSON.stringify({
        $schema: "http://adaptivecards.io/schemas/adaptive-card.json",
        type: "AdaptiveCard",
        version: "1.3",
        body: body,
        actions: [{ type: "Action.Submit", title: "Start chat" }]
      });
    }

    function lcw() {
      return {
        styleProps: {
          generalStyles: {
            width: "360px",
            height: "560px",
            bottom: "20px",
            right: "20px"
          }
        },
        chatButtonProps: {
          styleProps: {
            generalStyleProps: {
              position: "absolute"
            }
          }
        },
        headerProps: {
          controlProps: {
            headerTitleProps: {
              text: "Chat med en rådgiver"
            }
          }
        },
        // Force the pre-chat survey directly (startChat.ts reads this before falling
        // back to chatSDK.getPreChatSurvey), so the pre-chat pane renders on open.
        preChatSurveyPaneProps: {
          controlProps: {
            payload: buildTallPreChatSurvey()
          }
        },
        mock: {
          type: "designer",
          mockMessages: []
        }
      }
    }

    function setData(key, data, type) {
      try {
        if (type === "localStorage") {
          localStorage.setItem(key, data);
        } else {
          sessionStorage.setItem(key, data);
        }
      } catch (error) {
        console.error("logging to first party failed!")
      }
    }

    function getData(key, type) {
      if (type == "localStorage") {
        return localStorage.getItem(key);
      } else {
        return sessionStorage.getItem(key);
      }
    }
  </script>
  <div id="oc-lcw-container" style="width: 370px; height: 100%; position: fixed; right: 0; bottom: 0"></div>
  <script id="oc-lcw-script" src="../../dist/out.js" data-customization-callback="lcw" data-org-id="7d223c8d-6ef4-4eb9-9d96-47b5eea8afd2" data-app-id="aa10489e-a0c3-44d6-967c-f0a533653962"
    data-org-url="https://unq7d223c8d6ef44eb99d9647b5eea8a-crm.oc.crmlivetie.com" set-data-callback="setData" get-data-callback="getData"></script>
</body>

</html>
